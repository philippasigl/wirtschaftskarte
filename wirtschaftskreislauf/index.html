  /* ==============================================================

  const csvRows = [

  /* ==============================================================
     ENGINE · Ankerpunkt
     Zwei Varianten:
       { node, side, at }  — Kante eines Knotens
       { x, y, side }      — Roh-Punkt (z.B. Abzweig von anderem Pipe)
                             `side` gibt die Pipe-Austrittsrichtung an
     ============================================================== */
  function anchor(spec) {
    if (spec.node) {
      const [cx, cy, w, h] = nodes[spec.node].box;
      const x0 = cx - w/2, y0 = cy - h/2;
      switch (spec.side) {
        case 'top':    return { x: x0 + w * spec.at, y: y0       };
        case 'bottom': return { x: x0 + w * spec.at, y: y0 + h   };
        case 'left':   return { x: x0,               y: y0 + h * spec.at };
        case 'right':  return { x: x0 + w,           y: y0 + h * spec.at };
      }
      throw new Error(`unknown side: ${spec.side}`);
    }
    // Roh-Punkt
    return { x: spec.x, y: spec.y };
  }

  /* ==============================================================
     ENGINE · Rechtwinkliger Pfad (L- oder Z-Form, auto-gewählt)
     ============================================================== */
  function route(fromSpec, toSpec, via) {
    const f = anchor(fromSpec), t = anchor(toSpec);
    const fAxis = (fromSpec.side === 'top' || fromSpec.side === 'bottom') ? 'v' : 'h';
    const tAxis = (toSpec.side   === 'top' || toSpec.side   === 'bottom') ? 'v' : 'h';
    if (fAxis === 'v' && tAxis === 'h')
      return `M ${f.x} ${f.y} V ${t.y} H ${t.x}`;
    if (fAxis === 'h' && tAxis === 'v')
      return `M ${f.x} ${f.y} H ${t.x} V ${t.y}`;
    if (fAxis === 'v' && tAxis === 'v') {
      const midY = via?.y ?? (f.y + t.y) / 2;
      return `M ${f.x} ${f.y} V ${midY} H ${t.x} V ${t.y}`;
    }
    const midX = via?.x ?? (f.x + t.x) / 2;
    return `M ${f.x} ${f.y} H ${midX} V ${t.y} H ${t.x}`;
  }

  /* ==============================================================
     ENGINE · CSV-Zeilen matchen und aufsummieren
     ============================================================== */
  function aggregate(match) {
    if (!match) return { value: null, rows: [] };
    const rows = csvRows.filter(row =>
      Object.entries(match).every(([k, v]) =>
        Array.isArray(v) ? v.includes(row[k]) : row[k] === v));
    if (!rows.length) return { value: null, rows: [] };
    return { value: rows.reduce((s, r) => s + r.Wert, 0), rows };
  }

  function valueOf(flow) {
    if (flow.value != null) return flow.value;
    return aggregate(flow.match).value;
  }

  /* ==============================================================
     ENGINE · Pipe-Breite · √-Skala
     ============================================================== */
  const K = 1.6, MIN_D = 10, MAX_D = 90;
  function widthOf(v) {
    return v == null ? null : Math.max(MIN_D, Math.min(MAX_D, K * Math.sqrt(v)));
  }

  const fmtEUR = v =>
    v == null ? '' : Math.round(v).toLocaleString('de-DE') + ' Mrd. €';

  /* ==============================================================
     RENDER · SVG-Hilfen
     ============================================================== */
  function mk(tag, attrs, text) {
    const el = document.createElementNS(SVG_NS, tag);
    for (const k in attrs || {}) el.setAttribute(k, attrs[k]);
    if (text !== undefined) el.textContent = text;
    return el;
  }

  function parsePath(d) {
    const tk = d.trim().split(/\s+/);
    let x = 0, y = 0; const pts = [];
    for (let i = 0; i < tk.length; ) {
      const c = tk[i];
      if      (c === 'M') { x = +tk[i+1]; y = +tk[i+2]; pts.push({x, y}); i += 3; }
      else if (c === 'V') { y = +tk[i+1];              pts.push({x, y}); i += 2; }
      else if (c === 'H') { x = +tk[i+1];              pts.push({x, y}); i += 2; }
      else i++;
    }
    // filter duplicates (degenerate zero-length segments from default midpoints)
    const clean = pts.filter((p, i) => i === 0 || p.x !== pts[i-1].x || p.y !== pts[i-1].y);
    const s0 = clean[0], s1 = clean[1] || clean[0];
    const eN = clean[clean.length-1], eP = clean[clean.length-2] || eN;
    const startDir = (s1.x === s0.x)
      ? (s1.y > s0.y ? 'up'    : 'down')
      : (s1.x > s0.x ? 'left'  : 'right');
    const endDir = (eP.x === eN.x)
      ? (eN.y > eP.y ? 'down'  : 'up')
      : (eN.x > eP.x ? 'right' : 'left');
    return { start: s0, end: eN, startDir, endDir };
  }

  const WALL = 1, FL_H = 14, FL_RATIO = 1.55, INSET = 2;
  // ratio = 1.0 ergibt einen flachen Stub (keine Trichter-Weitung);
  // ratio = FL_RATIO (default) ergibt den Foster-Flare am Empfänger.
  function buildFlare(cx, cy, dir, D, ratio = FL_RATIO) {
    const d = D/2, w = (D * ratio)/2, H = FL_H;
    const shell = (off) => {
      const di = d + off, wi = w + off;
      switch (dir) {
        case 'up':    { const m = cy - INSET, b = cy + H, mid = cy + H/2;
          return `M ${cx-di} ${b} C ${cx-di} ${mid} ${cx-wi} ${mid} ${cx-wi} ${m} L ${cx+wi} ${m} C ${cx+wi} ${mid} ${cx+di} ${mid} ${cx+di} ${b} Z`; }
        case 'down':  { const m = cy + INSET, b = cy - H, mid = cy - H/2;
          return `M ${cx-di} ${b} C ${cx-di} ${mid} ${cx-wi} ${mid} ${cx-wi} ${m} L ${cx+wi} ${m} C ${cx+wi} ${mid} ${cx+di} ${mid} ${cx+di} ${b} Z`; }
        case 'left':  { const m = cx - INSET, b = cx + H, mid = cx + H/2;
          return `M ${b} ${cy-di} C ${mid} ${cy-di} ${mid} ${cy-wi} ${m} ${cy-wi} L ${m} ${cy+wi} C ${mid} ${cy+wi} ${mid} ${cy+di} ${b} ${cy+di} Z`; }
        case 'right': { const m = cx + INSET, b = cx - H, mid = cx - H/2;
          return `M ${b} ${cy-di} C ${mid} ${cy-di} ${mid} ${cy-wi} ${m} ${cy-wi} L ${m} ${cy+wi} C ${mid} ${cy+wi} ${mid} ${cy+di} ${b} ${cy+di} Z`; }
      }
    };
    return { outer: shell(WALL), inner: shell(0) };
  }

  /* ==============================================================
     ENGINE · Segment-Parser (für Auto-Label und Chevron)
     ============================================================== */
  function parseSegments(pathD) {
    const tk = pathD.trim().split(/\s+/);
    let x = 0, y = 0; const segs = [];
    for (let i = 0; i < tk.length; ) {
      const c = tk[i];
      if      (c === 'M') { x = +tk[i+1]; y = +tk[i+2]; i += 3; }
      else if (c === 'V') { const ny = +tk[i+1];
        if (ny !== y) segs.push({ kind: 'v', x0: x, y0: y, x1: x, y1: ny });
        y = ny; i += 2;
      }
      else if (c === 'H') { const nx = +tk[i+1];
        if (nx !== x) segs.push({ kind: 'h', x0: x, y0: y, x1: nx, y1: y });
        x = nx; i += 2;
      }
      else i++;
    }
    return segs;
  }
  function longestSegment(segs) {
    return segs.reduce((a, b) => {
      const la = a.kind === 'h' ? Math.abs(a.x1 - a.x0) : Math.abs(a.y1 - a.y0);
      const lb = b.kind === 'h' ? Math.abs(b.x1 - b.x0) : Math.abs(b.y1 - b.y0);
      return lb > la ? b : a;
    });
  }

  /* ==============================================================
     ENGINE · Chevron-Pfad (Flussrichtung in der Pipe)
     Offenes ">" in der Pipe-Innenfarbe-Richtung, dezent.
     ============================================================== */
  function buildChevron(cx, cy, dir, size) {
    const s = size;
    switch (dir) {
      case 'right': return `M ${cx-s} ${cy-s} L ${cx+s} ${cy} L ${cx-s} ${cy+s}`;
      case 'left':  return `M ${cx+s} ${cy-s} L ${cx-s} ${cy} L ${cx+s} ${cy+s}`;
      case 'down':  return `M ${cx-s} ${cy-s} L ${cx} ${cy+s} L ${cx+s} ${cy-s}`;
      case 'up':    return `M ${cx-s} ${cy+s} L ${cx} ${cy-s} L ${cx+s} ${cy+s}`;
    }
    return '';
  }

  /* ==============================================================
     ENGINE · Auto-Label-Position
     Legt das Label auf das längste Segment des Pfads, senkrecht
     versetzt um D/2 + padding. Wählt Seite so, dass das Label vom
     Canvas-Zentrum wegzeigt (oben/unten bzw. links/rechts).
     Override per `label.at`, `label.anchor`, `label.notePos`.
     ============================================================== */
  function autoLabel(pathD, D) {
    const tk = pathD.trim().split(/\s+/);
    let x = 0, y = 0; const segs = [];
    for (let i = 0; i < tk.length; ) {
      const c = tk[i];
      if      (c === 'M') { x = +tk[i+1]; y = +tk[i+2]; i += 3; }
      else if (c === 'V') { const ny = +tk[i+1];
        if (ny !== y) segs.push({ kind: 'v', x0: x, y0: y, x1: x,  y1: ny });
        y = ny; i += 2;
      }
      else if (c === 'H') { const nx = +tk[i+1];
        if (nx !== x) segs.push({ kind: 'h', x0: x, y0: y, x1: nx, y1: y  });
        x = nx; i += 2;
      }
      else i++;
    }
    if (!segs.length) return null;
    const best = segs.reduce((a, b) => {
      const la = a.kind === 'h' ? Math.abs(a.x1 - a.x0) : Math.abs(a.y1 - a.y0);
      const lb = b.kind === 'h' ? Math.abs(b.x1 - b.x0) : Math.abs(b.y1 - b.y0);
      return lb > la ? b : a;
    });
    const W = 1600, H = 1000;
    if (best.kind === 'h') {
      const mx = (best.x0 + best.x1) / 2;
      return {
        at: [mx, best.y0],
        anchor: 'middle',
        notePos: best.y0 < H / 2 ? 'above' : 'below',
      };
    } else {
      const my = (best.y0 + best.y1) / 2;
      return {
        at: [best.x0, my],
        anchor: 'middle',  // immer zentriert
        notePos: 'below',
      };
    }
  }

  /* ==============================================================
     RENDER · Knoten + Container
     ============================================================== */
  function renderNodes() {
    const containerG = document.getElementById('container');
    const nodesG     = document.getElementById('nodes');
    for (const [id, n] of Object.entries(nodes)) {
      if (n.type === 'invisible') continue;      // nur Anker, keine Darstellung
      const [cx, cy, w, h] = n.box;
      const x = cx - w/2, y = cy - h/2;
      if (n.type === 'container') {
        containerG.appendChild(mk('rect', {
          class: 'container-box', x, y, width: w, height: h }));
        containerG.appendChild(mk('text', {
          class: 'container-label', x: x + 14, y: y + 22 }, n.label));
      } else {
        const g = mk('g', { class: 'node', 'data-anchor': id,
          transform: `translate(${cx} ${cy})` });
        g.appendChild(mk('rect', { class: 'node-box',
          x: -w/2, y: -h/2, width: w, height: h }));
        g.appendChild(mk('text', { class: 'node-label',
          'text-anchor': 'middle', dy: 5 }, n.label));
        nodesG.appendChild(g);
      }
    }
  }

  /* ==============================================================
     RENDER · Pipes + Flares
     ============================================================== */
  function renderPipes() {
    const pipesG  = document.getElementById('pipes');
    const flaresG = document.getElementById('flares');

    const sorted = [...flows].sort((a, b) => {
      const va = valueOf(a), vb = valueOf(b);
      if (va == null && vb == null) return 0;
      if (va == null) return -1;
      if (vb == null) return  1;
      return va - vb;
    });

    for (const flow of sorted) {
      const d = route(flow.from, flow.to, flow.via);
      const v = valueOf(flow);
      const D = widthOf(v);
      const cycleAttr = flow.cycle ? { 'data-cycle': flow.cycle } : {};

      if (D == null) {
        pipesG.appendChild(mk('path', {
          class: 'pipe-dashed', 'data-flow': flow.id, d, ...cycleAttr }));
        continue;
      }
      pipesG.appendChild(mk('path', {
        class: 'pipe-outer', 'data-flow': flow.id, d, ...cycleAttr,
        style: `stroke-width: ${(D + 2 * WALL).toFixed(1)}`,
      }));
      pipesG.appendChild(mk('path', {
        class: 'pipe-inner', 'data-flow': flow.id, d, ...cycleAttr,
        style: `stroke-width: ${D.toFixed(1)}`,
      }));

      // Flare/Stub · Richtung durch unterschiedliche Form:
      //   Start (Sender)    → flacher Stub (ratio 1.0) bricht nur die Box-Linie
      //   Ziel (Empfänger)  → voller Trichter-Flare (ratio FL_RATIO)
      const { start, end, startDir, endDir } = parsePath(d);
      if (flow.from.node) {
        const f = buildFlare(start.x, start.y, startDir, D, 1.0);
        flaresG.appendChild(mk('path', { class: 'flare-outer', 'data-flow': flow.id, d: f.outer, ...cycleAttr }));
        flaresG.appendChild(mk('path', { class: 'flare-inner', 'data-flow': flow.id, d: f.inner, ...cycleAttr }));
      }
      if (flow.to.node) {
        const f = buildFlare(end.x, end.y, endDir, D);
        flaresG.appendChild(mk('path', { class: 'flare-outer', 'data-flow': flow.id, d: f.outer, ...cycleAttr }));
        flaresG.appendChild(mk('path', { class: 'flare-inner', 'data-flow': flow.id, d: f.inner, ...cycleAttr }));
      }

      // Chevron mittig am längsten Segment — zeigt Flussrichtung
      {
        const segs = parseSegments(d);
        if (segs.length) {
          const seg = longestSegment(segs);
          const mx = (seg.x0 + seg.x1) / 2;
          const my = (seg.y0 + seg.y1) / 2;
          const dir = seg.kind === 'h'
            ? (seg.x1 > seg.x0 ? 'right' : 'left')
            : (seg.y1 > seg.y0 ? 'down'  : 'up');
          const size = Math.max(4, Math.min(D * 0.4, 10));
          const chev = buildChevron(mx, my, dir, size);
          pipesG.appendChild(mk('path', {
            class: 'pipe-chevron', 'data-flow': flow.id, d: chev, ...cycleAttr,
          }));
        }
      }
    }
  }

  /* ==============================================================
     RENDER · Labels
     ============================================================== */
  function renderLabels() {
    const labelsG = document.getElementById('pipe-labels');
    for (const flow of flows) {
      const v = valueOf(flow);
      const D = widthOf(v) || 5;
      const pathD = route(flow.from, flow.to, flow.via);
      const auto  = autoLabel(pathD, D);
      for (const label of flow.labels || []) {
        const at      = label.at      ?? (auto ? auto.at      : [0, 0]);
        const anchor  = label.anchor  ?? (auto ? auto.anchor  : 'middle');
        const notePos = label.notePos ?? (auto ? auto.notePos : 'below');
        const g = mk('g', { class: 'pipe-label',
          transform: `translate(${at[0]} ${at[1]})` });
        if (label.name) {
          g.appendChild(mk('text',
            { class: 'pipe-name', 'text-anchor': anchor }, label.name));
        }
        if (label.showValue) {
          const dy = notePos === 'above' ? -14 : 18;
          g.appendChild(mk('text',
            { class: 'pipe-value', 'text-anchor': anchor, dy }, fmtEUR(v)));
        }
        if (label.note) {
          const dy = notePos === 'above' ? -30 : 34;
          g.appendChild(mk('text',
            { class: 'pipe-note', 'text-anchor': anchor, dy }, label.note));
        }
        labelsG.appendChild(g);
      }
    }
  }

  function renderFooter() {
    const g = document.getElementById('footer');
    g.setAttribute('transform', 'translate(40 970)');
    g.appendChild(mk('text', { class: 'footnote' }, footnote));
  }

  /* ==============================================================
     RENDER · Annotations (nummerierte Kreise)
     ============================================================== */
  function renderAnnotations() {
    const g = document.getElementById('annotations');
    const radius = 12;

    for (const ann of annotations) {
      // Pfeile zuerst zeichnen (unter dem Marker)
      if (ann.arrows) {
        for (const arrow of ann.arrows) {
          const line = mk('line', {
            class: 'annotation-arrow',
            x1: ann.x,
            y1: ann.y,
            x2: arrow.to[0],
            y2: arrow.to[1],
          });
          g.appendChild(line);
        }
      }

      const marker = mk('g', {
        class: 'annotation-marker',
        'data-annotation': ann.id,
        transform: `translate(${ann.x} ${ann.y})`,
      });

      marker.appendChild(mk('circle', {
        class: 'annotation-circle',
        cx: 0, cy: 0, r: radius,
      }));

      marker.appendChild(mk('text', {
        class: 'annotation-number',
        x: 0, y: 0,
      }, ann.id.toString()));

      g.appendChild(marker);
    }
  }

  /* ==============================================================
     INTERAKTIVITÄT · Annotation-Popups
     ============================================================== */
  function setupAnnotationPopups() {
    const popup = document.getElementById('annotation-popup');
    const popupNumber = document.getElementById('popup-number');
    const popupTitle = document.getElementById('popup-title');
    const popupText = document.getElementById('popup-text');
    const popupImages = document.getElementById('popup-images');
    const popupClose = document.getElementById('popup-close');
    const diagramWrap = document.querySelector('.diagram-wrap');

    let activeAnnotation = null;

    function showPopup(ann, markerEl) {
      popupNumber.textContent = ann.id;
      popupTitle.textContent = ann.title;
      popupText.textContent = ann.text;

      // Bilder anzeigen
      popupImages.innerHTML = '';
      const imageList = ann.images || (ann.image ? [ann.image] : []);
      for (const imgSrc of imageList) {
        const img = document.createElement('img');
        img.src = imgSrc;
        img.className = 'annotation-popup-image';
        if (ann.imageSize === 'small') {
          img.style.maxWidth = '200px';
        }
        popupImages.appendChild(img);
      }

      // Position relativ zum Marker berechnen
      const svg = document.querySelector('.diagram');
      const svgRect = svg.getBoundingClientRect();
      const viewBox = svg.viewBox.baseVal;
      const scaleX = svgRect.width / viewBox.width;
      const scaleY = svgRect.height / viewBox.height;

      let popupX, popupY;
      if (ann.popupPosition === 'left') {
        // Popup links vom Marker öffnen
        popup.style.left = 'auto';
        popup.style.right = (svgRect.width - (ann.x - viewBox.x) * scaleX + 20) + 'px';
      } else {
        popup.style.right = 'auto';
        popup.style.left = ((ann.x - viewBox.x) * scaleX + 20) + 'px';
      }
      popup.style.top = ((ann.y - viewBox.y) * scaleY - 10) + 'px';
      popup.classList.add('visible');
      activeAnnotation = ann.id;
    }

    function hidePopup() {
      popup.classList.remove('visible');
      activeAnnotation = null;
    }

    // Click auf Marker
    document.querySelectorAll('.annotation-marker').forEach(marker => {
      marker.addEventListener('click', (e) => {
        e.stopPropagation();
        const annId = parseInt(marker.getAttribute('data-annotation'));
        const ann = annotations.find(a => a.id === annId);
        if (ann) {
          if (activeAnnotation === annId) {
            hidePopup();
          } else {
            showPopup(ann, marker);
          }
        }
      });
    });

    // Close-Button
    popupClose.addEventListener('click', hidePopup);

    // Click außerhalb schließt Popup
    document.addEventListener('click', (e) => {
      if (!popup.contains(e.target) && !e.target.closest('.annotation-marker')) {
        hidePopup();
      }
    });
  }

  /* ==============================================================
     VALIDATOR
     ============================================================== */
  function validate() {
    const required = ['konsum', 'lohn-markt',
                      'steuer-haushalte', 'lohn-staat', 'transfer'];
    const core = flows.filter(f => f.tier === 'core').map(f => f.id);
    const missing = required.filter(id => !core.includes(id));
    if (missing.length)
      console.warn('⚠ Wirtschaftskreislauf · Kernflow(s) fehlen:', missing.join(', '));

    for (const f of flows) {
      if (!nodes[f.from.node]) console.warn(`⚠ Flow "${f.id}" referenziert fehlenden Knoten "${f.from.node}"`);
      if (!nodes[f.to.node])   console.warn(`⚠ Flow "${f.id}" referenziert fehlenden Knoten "${f.to.node}"`);
    }
  }

  /* ==============================================================
     INTERAKTIVITÄT · Hover-Effekte und fließende Chevron-Animation
     ============================================================== */
  function setupInteractivity() {
    const svg = document.querySelector('.diagram');
    const pipesG = document.getElementById('pipes');

    // Erstelle animierte Chevrons für jede Pipe
    const flowChevrons = {};
    document.querySelectorAll('.pipe-inner').forEach(inner => {
      const flowId = inner.getAttribute('data-flow');
      const cycle = inner.getAttribute('data-cycle');
      const d = inner.getAttribute('d');
      const pipeWidth = parseFloat(inner.style.strokeWidth) || 20;

      // Erstelle 3 Chevrons pro Pipe mit animateMotion
      const chevronSize = Math.max(4, Math.min(pipeWidth * 0.35, 8));
      const group = mk('g', { class: 'flow-chevron-group', 'data-flow': flowId });

      for (let i = 0; i < 3; i++) {
        const chevron = mk('path', {
          class: 'flow-chevron',
          'data-flow': flowId,
          'data-cycle': cycle,
          d: `M ${-chevronSize} ${-chevronSize} L 0 0 L ${-chevronSize} ${chevronSize}`,
        });

        // animateMotion für Bewegung entlang des Pfads
        const anim = document.createElementNS(SVG_NS, 'animateMotion');
        anim.setAttribute('dur', '5s');
        anim.setAttribute('repeatCount', 'indefinite');
        anim.setAttribute('begin', `${i * 1.67}s`); // Versetzt starten
        anim.setAttribute('rotate', 'auto');
        anim.setAttribute('calcMode', 'linear');

        const mpath = document.createElementNS(SVG_NS, 'mpath');
        mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'href', `#path-${flowId}`);
        anim.appendChild(mpath);
        chevron.appendChild(anim);

        group.appendChild(chevron);
      }

      // Speichere Referenz-Pfad mit ID
      inner.setAttribute('id', `path-${flowId}`);
      flowChevrons[flowId] = group;
      pipesG.appendChild(group);
    });

    // Hilfsfunktion: Finde alle Elemente eines Flows
    function getFlowElements(flowId) {
      return {
        outers: document.querySelectorAll(`.pipe-outer[data-flow="${flowId}"]`),
        inners: document.querySelectorAll(`.pipe-inner[data-flow="${flowId}"]`),
        chevrons: document.querySelectorAll(`.pipe-chevron[data-flow="${flowId}"]`),
        flares: document.querySelectorAll(`[data-flow="${flowId}"].flare-outer, [data-flow="${flowId}"].flare-inner`),
        flowChevrons: document.querySelectorAll(`.flow-chevron[data-flow="${flowId}"]`),
      };
    }

    // Hilfsfunktion: Finde verbundene Flows eines Knotens
    function getConnectedFlows(nodeId) {
      return flows.filter(f =>
        f.from.node === nodeId || f.to.node === nodeId
      ).map(f => f.id);
    }

    // Highlight aktivieren
    function highlightFlow(flowId) {
      svg.classList.add('has-hover');
      const els = getFlowElements(flowId);
      els.outers.forEach(el => el.classList.add('highlight'));
      els.inners.forEach(el => el.classList.add('highlight'));
      els.chevrons.forEach(el => el.classList.add('highlight'));
      els.flares.forEach(el => el.classList.add('highlight'));
      els.flowChevrons.forEach(el => el.classList.add('flowing'));

      // Finde und highlighte das zugehörige Label
      const flow = flows.find(f => f.id === flowId);
      if (flow && flow.labels) {
        const allLabels = document.querySelectorAll('.pipe-label');
        let labelIdx = 0;
        for (const f of flows) {
          for (const lbl of (f.labels || [])) {
            if (f.id === flowId) {
              allLabels[labelIdx]?.classList.add('highlight');
            }
            labelIdx++;
          }
        }
      }
    }

    // Highlight für Node und verbundene Flows
    function highlightNode(nodeId) {
      svg.classList.add('has-hover');
      const node = document.querySelector(`.node[data-anchor="${nodeId}"]`);
      if (node) node.classList.add('highlight');

      const connectedFlowIds = getConnectedFlows(nodeId);
      connectedFlowIds.forEach(flowId => {
        const els = getFlowElements(flowId);
        els.outers.forEach(el => el.classList.add('highlight'));
        els.inners.forEach(el => el.classList.add('highlight'));
        els.chevrons.forEach(el => el.classList.add('highlight'));
        els.flares.forEach(el => el.classList.add('highlight'));
        els.flowChevrons.forEach(el => el.classList.add('flowing'));

        // Labels der verbundenen Flows highlighten
        const allLabels = document.querySelectorAll('.pipe-label');
        let labelIdx = 0;
        for (const f of flows) {
          for (const lbl of (f.labels || [])) {
            if (f.id === flowId) {
              allLabels[labelIdx]?.classList.add('highlight');
            }
            labelIdx++;
          }
        }
      });
    }

    // Alle Highlights entfernen
    function clearHighlights() {
      svg.classList.remove('has-hover');
      document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
      document.querySelectorAll('.flowing').forEach(el => el.classList.remove('flowing'));
    }

    // Event-Listener für Pipes
    document.querySelectorAll('[data-flow]').forEach(el => {
      el.addEventListener('mouseenter', (e) => {
        const flowId = el.getAttribute('data-flow');
        if (flowId) highlightFlow(flowId);
      });
      el.addEventListener('mouseleave', clearHighlights);
    });

    // Event-Listener für Nodes
    document.querySelectorAll('.node').forEach(node => {
      node.addEventListener('mouseenter', () => {
        const nodeId = node.getAttribute('data-anchor');
        if (nodeId) highlightNode(nodeId);
      });
      node.addEventListener('mouseleave', clearHighlights);
    });
  }

  /* ==============================================================
     BUILD
     ============================================================== */
  validate();
  renderNodes();
  renderPipes();
  renderLabels();
  renderFooter();
  renderAnnotations();
  setupInteractivity();
  setupAnnotationPopups();

  // Toggle annotations visibility
  function setupAnnotationsToggle() {
    const toggle = document.getElementById('annotations-toggle');
    const annotationsGroup = document.getElementById('annotations');
    const popup = document.getElementById('annotation-popup');

    if (!toggle || !annotationsGroup) return;

    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        annotationsGroup.style.display = '';
      } else {
        annotationsGroup.style.display = 'none';
        popup.classList.remove('visible');
      }
    });
  }
  setupAnnotationsToggle();

})();
</script>
